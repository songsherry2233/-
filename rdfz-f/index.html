<title>人大附中早培初筛英语限时训练 F卷</title>
<style>
:root{--ink:#18252f;--muted:#66727d;--line:#d7e0e6;--bg:#f4f7f8;--panel:#fff;--accent:#136f63;--blue:#2f5d86;--bad:#a73535;--good:#18734f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Times New Roman","Songti SC",SimSun,serif}header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;justify-content:space-between;gap:16px;align-items:center}.brand{display:flex;flex-direction:column;gap:2px}.brand strong{font-family:"Songti SC",SimSun,serif;font-size:18px;color:#102c3c}.brand span{font-size:13px;color:var(--muted)}button{font:inherit;border:1px solid var(--line);border-radius:6px;padding:9px 12px;background:#fff;color:var(--ink);cursor:pointer}.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}main{max-width:1180px;margin:0 auto;padding:20px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 12px 28px rgba(23,48,64,.1)}.ph{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.ph h1,.ph h2{margin:0;font-family:"Songti SC",SimSun,serif;font-size:18px;color:#173f5f}.pb{padding:16px}.video{background:#0d171d;border-radius:8px;min-height:300px;overflow:hidden;display:grid;place-items:center}.video iframe{width:100%;height:min(60vw,520px);border:0;background:#000}.note{color:var(--muted);line-height:1.65}.timerbar{display:grid;grid-template-columns:110px 1fr 96px;gap:12px;align-items:center;margin-bottom:14px}.timer{font-size:28px;font-weight:800;color:var(--blue);text-align:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px;font-variant-numeric:tabular-nums}.progress{height:12px;border-radius:999px;background:#dfe8ed;overflow:hidden}.fill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--blue))}.tag{text-align:center;color:#fff;background:var(--blue);border-radius:999px;padding:9px 10px;font-weight:700}.grid{display:grid;grid-template-columns:minmax(0,1fr)420px;gap:16px;align-items:start}.material{max-height:calc(100vh - 170px);overflow:auto;line-height:1.75;font-size:17px}.material p{margin:0 0 12px;text-indent:1.6em}.hidden{display:grid;place-items:center;min-height:360px;color:var(--muted);text-align:center;line-height:1.7;padding:28px;background:#f7fafb;border-radius:8px;border:1px dashed var(--line)}.stem{font-size:20px;line-height:1.45;font-weight:700;margin:0 0 16px}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:10px}.option{display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:start;padding:11px 12px;border:1px solid var(--line);border-radius:7px;margin-bottom:10px;background:#fff;line-height:1.45;cursor:pointer}.option:hover{border-color:#9fb6c6;background:#f8fbfc}.option input{margin-top:3px;width:17px;height:17px}.answerText{width:100%;padding:12px;border:1px solid var(--line);border-radius:6px;font-size:18px}.actions{display:flex;justify-content:space-between;gap:10px;margin-top:16px}.dots{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}.dot{width:32px;height:32px;border-radius:6px;padding:0;font-size:13px}.dot.current{background:var(--blue);color:#fff;border-color:var(--blue)}.dot.done{border-color:var(--accent);color:var(--accent);font-weight:700}.score{display:grid;grid-template-columns:160px 1fr;gap:18px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:8px;background:#fff}.num{font-size:42px;font-weight:800;color:var(--accent);text-align:center}.review{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff;margin-top:10px}.correct{border-left:5px solid var(--good)}.wrong{border-left:5px solid var(--bad)}.kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:1px 5px;background:#fff;color:var(--muted)}@media(max-width:900px){header{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.timerbar{grid-template-columns:96px 1fr}.tag{grid-column:1/-1}.material{max-height:none}}
</style>

<body>
<header><div class="brand"><strong>人大附中早培初筛英语限时训练 F卷</strong><span>单向作答，每题 3 分钟，答完不可返回</span></div><button id="reset">重置</button></header>
<main id="app"></main>
<script>
const paper={id:'F',title:'人大附中早培初筛英语预测卷 F',subtitle:'Chengdu World Games and Cultural Communication',embedUrl:'https://www.youtube.com/embed/g7KZLNHIZH4',lecture:`The video is an official promotional video from The World Games for Chengdu 2025. It presents Chengdu in spring and connects the city with the coming World Games. Instead of using a long explanation, the video uses real city images to show why Chengdu can be a suitable host city. Viewers can see an energetic city with parks, streets, modern buildings, local life, and natural color.
The main purpose of the video is not to teach the rules of one sport. It is to build a city image. Chengdu is presented as a place where sport, culture, and daily life can meet. A promotional video like this works as a public guide: it helps international visitors form a first impression before they arrive. The images suggest that a sports event is also a chance to understand a city.
The video also reminds viewers that the World Games are different from ordinary city tourism. The phrase Road to Chengdu shows that the event is approaching and that people around the world are being invited to pay attention. For a host city, this is a form of cultural communication. The city must show its environment, its energy, and its hospitality as well as its stadiums.
Because the video is official, its tone is positive and carefully designed. It does not focus on problems or detailed competition results. Instead, it highlights atmosphere, identity, and connection. Such a video can improve the city's reputation if the real experience matches the image. But a successful event still needs good organization, clear signs, reliable transport, patient volunteers, and fluent explanations for international guests.
The final message is that a global sports event can become a bridge between people. Athletes come for competition, but visitors also notice food, parks, neighborhoods, and the way a city welcomes strangers. The World Games give Chengdu a public stage. If sport and culture are presented honestly and clearly, the event can help the city be remembered beyond the medals.`,reading:`International sports events are often remembered for exciting finals and bright opening ceremonies, but their influence can go much deeper. A host city does not simply provide stadiums. It provides transport, language services, food, safety plans, medical support, and cultural activities. Each part may seem small, yet together they shape the experience of athletes and visitors.
The World Games are especially interesting because they include many sports that are not always seen in the Olympics. Some sports are fast and dramatic, while others require patience and careful judgment. Flying disc, for example, depends on speed, teamwork, and trust among players. Sport climbing requires strength, planning, and the ability to make quick decisions under pressure. Martial arts can show both physical skill and cultural tradition. These events give young people more ways to imagine an active life.
For volunteers, the work may look mundane at first. They may stand near an entrance, answer the same question many times, or guide visitors to the correct bus. However, these simple tasks can become meaningful. A confused visitor may feel less nervous after receiving clear assistance. An athlete may remember a volunteer who solved a small problem quickly. A family may decide to explore more of the city because someone gave them a patient explanation.
The success of a sports event also depends on communication. Rules that are obvious to experts may be difficult for new audiences. If a commentator or volunteer can convert complicated rules into accessible language, the audience can follow the event more easily. This improves enjoyment and helps a new sport reach more people. In this sense, language is part of the event's infrastructure, just like roads and stadiums.
There is also a cultural side. Visitors may come for a competition but leave with memories of local food, music, museums, parks, and conversations. Social media can speed up this process because participants share photos and stories with friends in other countries. However, a city should not rely only on beautiful images. Its real reputation is built through reliable services, respectful communication, and thoughtful organization.
For students, the lesson is clear. A large event is not successful because one person shines. It succeeds when many people perform their roles well. Athletes, volunteers, organizers, drivers, doctors, and translators all contribute. The World Games show that public events are a test of teamwork at scale. They also show that cultural communication becomes stronger when people combine efficiency with kindness.`,questions:[
{index:1,phase:'lecture',type:'text',stem:'1. Chengdu is a city 1. ______ the World Games will be held.',answer:'where'},
{index:2,phase:'lecture',type:'single',stem:'2. What is the main purpose of the video?',options:['A. To review the rules of one World Games event','B. To present Chengdu as an attractive host city','C. To compare Chengdu with other host cities','D. To explain how athletes train for the Games'],answer:'B'},
{index:3,phase:'lecture',type:'single',stem:'3. Why might a city make a promotional video before an international event?',options:['A. To create a first impression before visitors arrive','B. To show that services matter less than images','C. To replace detailed planning with public attention','D. To separate the event from the host city'],answer:'A'},
{index:4,phase:'lecture',type:'single',stem:'4. Which statement best shows a balanced view of the video?',options:['A. Beautiful images can support, but not replace, real preparation.','B. A positive city image should be supported by real services.','C. Promotional videos work best when they avoid local culture.','D. International guests judge a city mainly by stadium size.'],answer:'B'},
{index:5,phase:'lecture',type:'single',stem:'5. What does Road to Chengdu most likely suggest?',options:['A. The event is approaching and people are invited to pay attention','B. The city is being introduced mainly as a travel destination','C. The event will depend more on roads than on organization','D. The city wants visitors to focus only on transportation'],answer:'A'},
{index:6,phase:'lecture',type:'single',stem:'6. Which idea best explains cultural communication in this topic?',options:['A. It means translating local customs without showing daily life.','B. It means helping outsiders understand a city through shared experiences.','C. It means keeping sports events separate from local identity.','D. It means asking visitors to judge the city only by images.'],answer:'B'},
{index:7,phase:'lecture',type:'single',stem:'7. What attitude should a viewer have toward a promotional video?',options:['A. Critical but fair: notice the image and ask what supports it.','B. Doubtful by default: assume positive images hide real problems.','C. Passive and neutral: avoid judging the city or the event.','D. Emotional only: judge the message mainly by music and color.'],answer:'A'},
{index:8,phase:'lecture',type:'single',stem:'8. The word promotional is closest in meaning to ______.',options:['A. designed to introduce something and attract public attention','B. designed to record something without shaping an impression','C. designed to compare several choices in a neutral report','D. designed to analyze a problem with technical evidence'],answer:'A'},
{index:9,phase:'lecture',type:'single',stem:'9. Which situation would most weaken the message of a host-city promotional video?',options:['A. Visitors find the real city organized and welcoming.','B. Volunteers give patient and practical assistance.','C. The real experience feels confusing and inconsistent.','D. The video shows parks, streets, and public spaces.'],answer:'C'},
{index:10,phase:'lecture',type:'single',stem:'10. What can students learn from the video?',options:['A. Public events become meaningful only through competition results.','B. A city can use a sports event to build bridges with others.','C. Culture should be presented separately from daily city life.','D. Good communication means keeping the message simple but vague.'],answer:'B'},
{index:11,phase:'lecture',type:'multi',stem:'11. What would help Chengdu welcome international guests well?',options:['A. Reliable transport for moving around the city','B. Clear signs that reduce confusion for visitors','C. Patient volunteers who can offer useful assistance','D. Complicated explanations that sound more official','E. Fluent communication in common public situations'],answer:['A','B','C','E']},
{index:12,phase:'reading',type:'single',stem:'12. What is the main purpose of the article?',options:['A. To show how international sports events influence a city beyond competition','B. To explain why one World Games sport is harder than other events','C. To describe how athletes prepare physically before international finals','D. To compare volunteer work with professional sports management'],answer:'A'},
{index:13,phase:'reading',type:'single',stem:"13. Why does the article call language part of the event's infrastructure?",options:['A. Language services can support visitors much like transport and signs.','B. Language can replace roads and stadiums when planning is limited.','C. Language matters only when athletes cannot understand the rules.','D. Language is useful mainly for social media after the event ends.'],answer:'A'},
{index:14,phase:'reading',type:'single',stem:'14. What can be inferred from the last paragraph?',options:["A. A large event succeeds through many connected roles, not one person's effort.",'B. A large event depends mostly on athletes and opening ceremony design.','C. Translators and doctors become important only when problems happen.','D. Efficiency and kindness usually pull public events in opposite directions.'],answer:'A'}]};
const app=document.getElementById('app'),limit=180,letters=['A','B','C','D','E'];let mode='video',qi=0,answers={},left=limit,timer=null,timed=[];
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function ps(t){return t.split('\n').map(x=>`<p>${esc(x)}</p>`).join('')}function fmt(n){return `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`}function stop(){if(timer)clearInterval(timer);timer=null}function tick(){left--;drawTimer();if(left<=0){timed.push(paper.questions[qi].index);next()}}function start(){stop();left=limit;renderQ();timer=setInterval(tick,1000)}function drawTimer(){let t=document.getElementById('timer'),f=document.getElementById('fill');if(!t||!f)return;t.textContent=fmt(Math.max(0,left));let p=Math.max(0,left/limit*100);f.style.width=p+'%';f.style.background=p<20?'linear-gradient(90deg,#a73535,#d88a1d)':'linear-gradient(90deg,var(--accent),var(--blue))'}
function renderVideo(){stop();app.innerHTML=`<section class="panel"><div class="ph"><h1>${esc(paper.title)}｜视频材料</h1><button class="primary" id="begin">开始答题</button></div><div class="pb"><div class="video"><iframe src="${paper.embedUrl}" title="${esc(paper.title)} video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div><p class="note">看完视频后开始答题。开始后不显示讲座原文，且不能回到上一题。</p></div></section>`;document.getElementById('begin').onclick=()=>{qi=0;answers={};timed=[];start()}}
function ctrl(q){let saved=answers[q.index];if(q.type==='text')return `<input id="textAnswer" class="answerText" value="${esc(saved||'')}" autocomplete="off" spellcheck="false">`;let type=q.type==='multi'?'checkbox':'radio',set=new Set(Array.isArray(saved)?saved:(saved?[saved]:[]));return q.options.map((o,i)=>{let L=letters[i],txt=`${L}. ${String(o).replace(/^[A-E]\s*[.．、)]\s*/,'')}`;return `<label class="option"><input type="${type}" name="answer" value="${L}" ${set.has(L)?'checked':''}><span>${esc(txt)}</span></label>`}).join('')}
function renderQ(){let q=paper.questions[qi],read=q.phase==='reading';app.innerHTML=`<div class="timerbar"><div id="timer" class="timer">${fmt(left)}</div><div class="progress"><div id="fill" class="fill"></div></div><div class="tag">${read?'Reading':'Video Q'}</div></div><div class="grid"><section class="panel"><div class="ph"><h1>${read?'Reading Material':'Video Finished'}</h1><span class="note">F 卷</span></div><div class="pb">${read?`<div class="material">${ps(paper.reading)}</div>`:`<div class="hidden">视频材料已播放完毕。<br>当前为记忆、理解与常识拓展答题区。</div>`}</div></section><aside class="panel"><div class="ph"><h2>Question ${q.index} / ${paper.questions.length}</h2><span class="note">${timed.includes(q.index)?'Timed out':'In progress'}</span></div><div class="pb"><div class="meta"><span>${q.type==='multi'?'Multiple answers':q.type==='text'?'Fill in the blank':'Single answer'}</span><span>3 minutes</span></div><p class="stem">${esc(q.stem)}</p><div id="answerArea">${ctrl(q)}</div><div class="actions"><button disabled>不可返回</button><button class="primary" id="next">${qi===paper.questions.length-1?'交卷':'下一题'}</button></div><div class="dots">${paper.questions.map((x,i)=>`<button class="dot ${i===qi?'current':''} ${answers[x.index]?'done':''}" disabled>${x.index}</button>`).join('')}</div></div></aside></div>`;drawTimer();wire(q)}
function wire(q){if(q.type==='text'){let i=document.getElementById('textAnswer');i.oninput=()=>answers[q.index]=i.value.trim();i.focus()}else document.querySelectorAll("input[name='answer']").forEach(i=>i.onchange=()=>{if(q.type==='multi')answers[q.index]=[...document.querySelectorAll("input[name='answer']:checked")].map(x=>x.value);else answers[q.index]=i.value;renderQ()});document.getElementById('next').onclick=next}
function next(){if(qi>=paper.questions.length-1){mode='result';renderResult();return}qi++;start()}function norm(v){return Array.isArray(v)?v.map(x=>String(x).trim().toUpperCase()).sort().join(','):String(v||'').trim().toUpperCase()}function ok(q){return norm(answers[q.index])===norm(q.answer)}function show(v){return Array.isArray(v)?v.join(', '):(v||'No answer')}
function renderResult(){stop();let correct=paper.questions.filter(ok).length,total=paper.questions.length;app.innerHTML=`<section class="panel"><div class="ph"><h1>${esc(paper.title)}｜结果与答案</h1><button class="primary" id="redo">重新练习</button></div><div class="pb"><div class="score"><div class="num">${correct}/${total}</div><div><p class="note">正确率：${Math.round(correct/total*100)}%</p><p class="note">超时题：${timed.join(', ')||'无'}</p></div></div>${paper.questions.map(q=>`<div class="review ${ok(q)?'correct':'wrong'}"><p><strong>${q.index}. ${esc(q.stem)}</strong></p><p>Your answer: <span class="kbd">${esc(show(answers[q.index]))}</span></p><p>Correct answer: <span class="kbd">${esc(show(q.answer))}</span></p></div>`).join('')}</div></section>`;document.getElementById('redo').onclick=renderVideo}
document.getElementById('reset').onclick=()=>{qi=0;answers={};timed=[];renderVideo()};document.addEventListener('keydown',e=>{if(!document.getElementById('next'))return;if(e.key==='ArrowRight')next();let q=paper.questions[qi],k=e.key.toUpperCase();if(letters.includes(k)&&q.type!=='text'){let input=[...document.querySelectorAll("input[name='answer']")].find(x=>x.value===k);if(input){if(q.type==='multi')input.checked=!input.checked;else input.checked=true;input.dispatchEvent(new Event('change'))}}});renderVideo();
</script>
</body>
